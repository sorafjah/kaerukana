<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>かえる？かえない？</title>
<style>
  :root {
    --bg: #fdf6e3;
    --surface: #fff8e7;
    --border: #e8d5a3;
    --text: #3d2c00;
    --sub: #7a5f28;
    --accent: #e8913a;
    --correct: #4caf50;
    --wrong: #e05a47;
    --wallet-max: 640px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    font-family: 'BIZ UDPGothic', 'BIZ UDGothic', sans-serif;
    background: var(--bg);
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .screen { display: none; position: absolute; top:0; left:0; width:100%; height:100%; }
  .screen.active { display: flex; }

  /* ===== MAIN ===== */
  #main-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
    gap: 10px;
    width: 100%;
  }

  #progress-text {
    position: fixed;
    bottom: 8px;
    right: 10px;
    font-size: 12px;
    font-weight: bold;
    color: var(--sub);
    opacity: 0.4;
    z-index: 90;
    pointer-events: none;
  }
  #prompt-text {
    font-size: 22px;
    font-weight: bold;
    color: var(--sub);
    text-align: center;
    margin-bottom: 4px;
  }

  .game-area { display: none; flex-direction: column; align-items: center; gap: 14px; width: 100%; }
  .game-area.active { display: flex; }

  /* ---- 判断モード：商品ひとつ＋さいふひとつ ---- */
  #c-product {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: white; border: 2px solid var(--border); border-radius: 18px;
    padding: 14px 22px; width: 100%; max-width: var(--wallet-max);
  }
  #c-product-label { font-size: 14px; font-weight: bold; color: var(--sub); }
  #c-product-emoji { font-size: 56px; line-height: 1; }
  #c-product-price { font-size: 30px; font-weight: bold; color: var(--text); }

  #c-wallet {
    width: 100%; max-width: var(--wallet-max);
    background: white; border: 2px solid var(--border); border-radius: 18px;
    padding: 14px 16px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  #c-wallet-label { font-size: 14px; font-weight: bold; color: var(--sub); }

  #judge-btn-row {
    display: flex; gap: 14px; width: 100%; max-width: var(--wallet-max);
  }
  .judge-btn {
    flex: 1; font-family: inherit; font-size: 20px; font-weight: bold;
    padding: 18px 10px; border-radius: 26px; border: 4px solid transparent;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: transform 0.14s, border-color 0.14s, box-shadow 0.14s;
  }
  .judge-btn:active { transform: scale(0.95); }
  .judge-btn.disabled { pointer-events: none; }
  #btn-kaeru  { background: var(--accent); color: white; }
  #btn-kaenai { background: #d8c8a0; color: var(--sub); }

  /* ---- くらべるモード：商品1つ+さいふ2つ / さいふ1つ+商品2つ ---- */
  #m1-product {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: white; border: 2px solid var(--border); border-radius: 18px;
    padding: 14px 22px; width: 100%; max-width: var(--wallet-max);
  }
  #m1-product-emoji { font-size: 56px; line-height: 1; }
  #m1-product-price { font-size: 30px; font-weight: bold; color: var(--text); }

  #m2-wallet {
    width: 100%; max-width: var(--wallet-max);
    background: white; border: 2px solid var(--border); border-radius: 18px;
    padding: 14px 16px; display: flex; flex-direction: column; align-items: center; gap: 8px;
  }

  #m1-wallets-row, #m2-products-row {
    display: flex; gap: 14px; width: 100%; max-width: var(--wallet-max);
  }

  .wallet-option, .product-option {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 16px 10px; border-radius: 20px; border: 3px solid var(--border);
    background: var(--surface); cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.14s, border-color 0.14s, box-shadow 0.14s, background 0.14s;
  }
  .wallet-option:active, .product-option:active { transform: scale(0.95); }
  .wallet-option.disabled, .product-option.disabled { pointer-events: none; }

  .wallet-coins {
    display: flex; flex-wrap: wrap; gap: 4px;
    justify-content: center; align-items: center;
    min-height: 40px;
  }
  .empty-wallet { font-size: 14px; color: var(--sub); }
  .wallet-total { font-size: 19px; font-weight: bold; color: var(--accent); }
  .wallet-total.hide { display: none; }

  .po-emoji { font-size: 48px; line-height: 1; }
  .po-price { font-size: 23px; font-weight: bold; color: var(--text); }

  #compare-cant-row { display: flex; width: 100%; max-width: var(--wallet-max); }
  #btn-compare-cant { background: #d8c8a0; color: var(--sub); }

  @keyframes pulseCorrect {
    0% { transform: scale(1); }
    40% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes shakeWrong {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-9px); }
    40% { transform: translateX(9px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .correct-flash {
    animation: pulseCorrect 0.4s ease;
    border-color: var(--correct) !important;
    box-shadow: 0 4px 16px rgba(76,175,80,0.5);
  }
  .wrong-flash {
    animation: shakeWrong 0.45s ease;
    border-color: var(--wrong) !important;
    box-shadow: 0 4px 16px rgba(224,90,71,0.4);
  }

  /* ===== トースト ===== */
  #toast {
    position: fixed; top: 18px; left:50%;
    transform: translate(-50%, -16px) scale(0.85);
    background: rgba(255,200,100,0.97);
    color: #3d2c00; font-size:26px; font-weight:bold;
    padding:18px 34px; border-radius:24px;
    pointer-events:none; opacity:0; z-index:300;
    transition: opacity 0.2s, transform 0.2s;
    text-align: center;
    box-shadow: 0 4px 20px rgba(180,120,0,0.3);
  }
  #toast.show { opacity:1; transform:translate(-50%, 0) scale(1); }

  /* ===== 左下ボタン群 ===== */
  #gear-btn {
    position: fixed; top: 8px; left: 8px;
    width: 36px; height: 36px; background: none; border: none;
    cursor: pointer; opacity: 0.28; padding: 0;
    z-index: 100;
    -webkit-tap-highlight-color: transparent;
  }
  #gear-btn:hover { opacity: 0.55; }

  /* ===== RESULT ===== */
  #result-screen {
    flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 20px;
  }
  #result-emoji { font-size: 60px; }
  #result-title { font-size: 26px; font-weight: bold; color: var(--text); text-align: center; }
  #result-msg { font-size: 18px; font-weight: bold; color: var(--accent); text-align: center; }
  #result-restart-btn {
    padding: 14px 44px; background: var(--accent); color: white;
    border: none; border-radius: 26px;
    font-size: 18px; font-weight: bold; cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  /* ===== SETTINGS ===== */
  #settings-screen {
    flex-direction: column; align-items: center;
    padding: 14px 12px; gap: 10px; overflow-y: auto;
  }
  #settings-title-bar { font-size: 18px; font-weight: bold; color: var(--text); }
  .s-card {
    width: 100%; max-width: 560px;
    background: var(--surface);
    border: 2px solid var(--border); border-radius: 14px; padding: 10px 12px;
  }
  .s-card h3 { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
  .s-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 0; border-bottom: 1px solid var(--border); gap: 8px; flex-wrap: wrap;
  }
  .s-row:last-child { border-bottom: none; }
  .s-lbl { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: bold; color: var(--text); flex-shrink: 0; }
  .s-ctrl { display: flex; align-items: center; gap: 3px; }
  .step-btn {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid var(--border); background: white;
    font-size: 16px; cursor: pointer; font-family: inherit; color: var(--text);
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .step-btn:active { background: #fff0cc; }
  .s-val { font-size: 15px; font-weight: bold; color: var(--text); min-width: 30px; text-align: center; }
  .s-range-lbl { font-size: 12px; color: var(--sub); margin: 0 2px; white-space: nowrap; }

  .seg-toggle {
    display: flex;
    border: 2px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    flex-shrink: 0;
    width: 100%;
  }
  .seg-btn {
    flex: 1;
    font-family: inherit;
    font-size: 13px;
    font-weight: bold;
    padding: 7px 8px;
    border: none;
    background: white;
    color: var(--sub);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .seg-btn.active { background: var(--accent); color: white; }
  .seg-btn:not(:last-child) { border-right: 1px solid var(--border); }

  .toggle-switch {
    position: relative; width: 54px; height: 28px;
    cursor: pointer; -webkit-tap-highlight-color: transparent; flex-shrink: 0;
  }
  .toggle-switch input { display: none; }
  .toggle-track {
    position: absolute; inset: 0; border-radius: 14px;
    background: #ccc; transition: background 0.2s;
  }
  .toggle-switch input:checked + .toggle-track { background: var(--accent); }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 22px; height: 22px; border-radius: 50%;
    background: white; box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    transition: left 0.2s;
    pointer-events: none;
  }
  .toggle-switch input:checked ~ .toggle-thumb { left: 29px; }

  .kizami-group { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .kizami-btn {
    padding: 6px 14px; border-radius: 16px;
    border: 2px solid var(--border); background: white;
    font-size: 13px; font-weight: bold; color: var(--sub);
    cursor: pointer; font-family: inherit; -webkit-tap-highlight-color: transparent;
  }
  .kizami-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  #s-back-btn {
    padding: 10px 44px; background: var(--accent); color: white;
    border: none; border-radius: 22px;
    font-size: 16px; font-weight: bold; cursor: pointer; font-family: inherit;
  }
</style>
</head>
<body>

<!-- ===== MAIN ===== -->
<div id="main-screen" class="screen">
  <div id="progress-text">1/15</div>
  <div id="prompt-text">これ、かえる？ かえない？</div>

  <!-- 判断モード -->
  <div id="judge-area" class="game-area">
    <div id="c-product">
      <div id="c-product-label">ほしいもの</div>
      <div id="c-product-emoji">🍩</div>
      <div id="c-product-price">120円</div>
    </div>
    <div id="c-wallet">
      <div id="c-wallet-label">さいふのなか</div>
      <div class="wallet-coins" id="c-wallet-coins"></div>
      <div class="wallet-total" id="c-wallet-total">0円</div>
    </div>
    <div id="judge-btn-row">
      <button class="judge-btn" id="btn-kaeru">かえる</button>
      <button class="judge-btn" id="btn-kaenai">かえない</button>
    </div>
  </div>

  <!-- くらべるモード -->
  <div id="compare-area" class="game-area">
    <div id="mode1-area" class="game-area">
      <div id="m1-product">
        <div id="m1-product-emoji">🍩</div>
        <div id="m1-product-price">120円</div>
      </div>
      <div id="m1-wallets-row"></div>
    </div>
    <div id="mode2-area" class="game-area">
      <div id="m2-wallet"></div>
      <div id="m2-products-row"></div>
    </div>
    <div id="compare-cant-row">
      <button class="judge-btn" id="btn-compare-cant">どちらも 買えない</button>
    </div>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result-screen" class="screen">
  <div id="result-emoji">🎉</div>
  <div id="result-title">15問中 12問 せいかい！</div>
  <div id="result-msg">よくできました！</div>
  <button id="result-restart-btn">もういちど</button>
</div>

<!-- ===== SETTINGS ===== -->
<div id="settings-screen" class="screen active">
  <div id="settings-title-bar">せってい</div>

  <div class="s-card">
    <h3>あそびかた</h3>
    <div class="seg-toggle" id="gametype-seg">
      <button class="seg-btn active" data-gametype="judge">買える/買えない</button>
      <button class="seg-btn" data-gametype="compare">どっちが買えるか</button>
    </div>
    <div id="compare-sub-wrap" style="display:none; margin-top:10px;">
      <div class="s-lbl" style="margin-bottom:6px;">くらべるもの</div>
      <div class="seg-toggle" id="compare-sub-seg">
        <button class="seg-btn active" data-mode="wallet">さいふを選ぶ</button>
        <button class="seg-btn" data-mode="product">商品を選ぶ</button>
        <button class="seg-btn" data-mode="random">ランダム</button>
      </div>
    </div>
  </div>

  <div class="s-card">
    <h3>もんだいすう</h3>
    <div class="s-row" style="border-bottom:none;">
      <div class="s-lbl">なんもん？</div>
      <div class="s-ctrl">
        <button class="step-btn" id="s-qcount-minus">－</button>
        <div class="s-val" id="s-qcount">15</div>
        <button class="step-btn" id="s-qcount-plus">＋</button>
        <span class="s-range-lbl">もん</span>
      </div>
    </div>
  </div>

  <div class="s-card">
    <h3>ひょうじ</h3>
    <div class="s-row" style="border-bottom:none;">
      <div class="s-lbl">さいふのごうけいを表示</div>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-show-total" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
  </div>

  <div class="s-card">
    <h3>きんがくの はんい（商品のねだん）</h3>
    <div class="s-row">
      <div class="s-lbl">下限</div>
      <div class="s-ctrl">
        <button class="step-btn" id="s-min-minus">－</button>
        <div class="s-val" id="s-min-amount">100</div>
        <button class="step-btn" id="s-min-plus">＋</button>
        <span class="s-range-lbl">円</span>
      </div>
    </div>
    <div class="s-row">
      <div class="s-lbl">上限</div>
      <div class="s-ctrl">
        <button class="step-btn" id="s-max-minus">－</button>
        <div class="s-val" id="s-max-amount">800</div>
        <button class="step-btn" id="s-max-plus">＋</button>
        <span class="s-range-lbl">円</span>
      </div>
    </div>
    <div class="s-row">
      <div class="s-lbl">きざみ</div>
      <div class="kizami-group" id="kizami-group"></div>
    </div>
  </div>

  <div class="s-card">
    <h3>むずかしさ（ねだんと さいふの ちがい）</h3>
    <div class="s-row">
      <div class="s-lbl">さいしょう</div>
      <div class="s-ctrl">
        <button class="step-btn" id="s-mgmin-minus">－</button>
        <div class="s-val" id="s-margin-min">10</div>
        <button class="step-btn" id="s-mgmin-plus">＋</button>
        <span class="s-range-lbl">円</span>
      </div>
    </div>
    <div class="s-row">
      <div class="s-lbl">さいだい</div>
      <div class="s-ctrl">
        <button class="step-btn" id="s-mgmax-minus">－</button>
        <div class="s-val" id="s-margin-max">200</div>
        <button class="step-btn" id="s-mgmax-plus">＋</button>
        <span class="s-range-lbl">円</span>
      </div>
    </div>
  </div>

  <button id="s-back-btn">はじめる</button>
</div>

<div id="toast"></div>

<button id="gear-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8" width="32" height="32">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>

<script>
const DENOMS = [
  { val:1000, label:'1000円', type:'note' },
  { val:500,  label:'500円',  type:'coin' },
  { val:100,  label:'100円',  type:'coin' },
  { val:50,   label:'50円',   type:'coin' },
  { val:10,   label:'10円',   type:'coin' },
  { val:5,    label:'5円',    type:'coin' },
  { val:1,    label:'1円',    type:'coin' },
];
const KIZAMI_OPTIONS = [1, 10, 50, 100];

let minAmount = 100, maxAmount = 800, kizami = 10;
let marginMin = 10, marginMax = 200;
let showTotal = true;
let gameType = 'judge';        // 'judge' | 'compare'
let compareSubMode = 'wallet'; // 'wallet' | 'product' | 'random'

let totalQuestions = 15;
let currentQuestionNum = 1;
let correctCount = 0;

let currentRound = null;
let currentCompareMode = null; // compareモードの今回のサブ種類('wallet'|'product')
let busy = false;

const COIN_MINI = 38, NOTE_W_MINI = 62, NOTE_H_MINI = 36;

const PRODUCTS = [
  ['🍩','ドーナツ'],['🍪','クッキー'],['🍭','キャンディ'],['🍫','チョコレート'],
  ['🧃','ジュース'],['🍞','パン'],['🍙','おにぎり'],['🥪','サンドイッチ'],
  ['🍜','ラーメン'],['🍦','アイスクリーム'],['🍰','ケーキ'],['🍿','ポップコーン'],
  ['✏️','えんぴつ'],['📓','ノート'],['🖍️','クレヨン'],['🎮','ゲーム'],
  ['🧸','ぬいぐるみ'],['⚽','ボール'],['🎨','えのぐ'],['🪀','ヨーヨー'],
  ['🍎','りんご'],['🍌','バナナ'],['🍇','ぶどう'],['🍓','いちご'],
  ['🎀','リボン'],['🖊️','ボールペン'],['📎','クリップ'],['🧩','パズル'],
];

/* ===== SVG（コイン・おさつ） ===== */
function coinSVG(val, size) {
  if (val === 500) {
    // 500円玉だけ特別あつかい：ふち金色＋まんなか銀色のツートンで100円玉とはっきり区別する
    const r = size / 2, ts = size * 0.24;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
  <circle cx="${r}" cy="${r}" r="${r-1}" fill="#5a5a5a"/>
  <circle cx="${r}" cy="${r}" r="${r-3}" fill="#ced2d6"/>
  <circle cx="${r}" cy="${r}" r="${r*0.6}" fill="#d9a521"/>
  <circle cx="${r}" cy="${r}" r="${r*0.6}" fill="none" stroke="#8a6200" stroke-width="1.6"/>
  <text x="${r}" y="${r + ts*0.38}" text-anchor="middle" font-size="${ts}" font-weight="900"
    fill="#4a2e00" font-family="BIZ UDPGothic,sans-serif">500</text>
</svg>`;
  }
  const C = {
    1:   { bg:'#b2b2b2', inner:'#d4d4d4', rim:'#444',    text:'1',   hole:false },
    5:   { bg:'#c8a84b', inner:'#e0c060', rim:'#5a3a00', text:'5',   hole:true  },
    10:  { bg:'#b87333', inner:'#d4946a', rim:'#4a1800', text:'10',  hole:false },
    50:  { bg:'#b0b0b0', inner:'#d0d0d0', rim:'#333',    text:'50',  hole:true  },
    100: { bg:'#a8a8a8', inner:'#c8c8c8', rim:'#2a2a2a', text:'100', hole:false },
  };
  const c = C[val], r = size/2, holeR = size*0.11;
  const ts = val>=100 ? size*0.26 : val>=10 ? size*0.30 : size*0.36;
  const textY = c.hole ? r*0.52+ts*0.38 : r+ts*0.38;
  const hole = c.hole
    ? `<circle cx="${r}" cy="${r}" r="${holeR}" fill="#fff8e7" stroke="${c.rim}" stroke-width="1.2"/>`
    : '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">
  <circle cx="${r}" cy="${r}" r="${r-1}" fill="${c.rim}"/>
  <circle cx="${r}" cy="${r}" r="${r-3}" fill="${c.bg}"/>
  <circle cx="${r}" cy="${r}" r="${r-5}" fill="${c.inner}" opacity="0.5"/>
  ${hole}
  <text x="${r}" y="${textY}" text-anchor="middle" font-size="${ts}" font-weight="900"
    fill="${c.rim}" font-family="BIZ UDPGothic,sans-serif">${c.text}</text>
</svg>`;
}
function noteSVG(w, h, val) {
  const c = { bg:'#ede0c4', border:'#7a5010', inner:'#f8f0dc' };
  const ts = h * 0.33;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
  <rect x="1" y="1" width="${w-2}" height="${h-2}" rx="5" fill="${c.border}"/>
  <rect x="3" y="3" width="${w-6}" height="${h-6}" rx="4" fill="${c.bg}"/>
  <rect x="6" y="6" width="${w-12}" height="${h-12}" rx="3" fill="${c.inner}" opacity="0.55"/>
  <text x="${w*0.5}" y="${h*0.63}" text-anchor="middle" font-size="${ts}" font-weight="900"
    fill="${c.border}" font-family="BIZ UDPGothic,sans-serif">${val}</text>
</svg>`;
}

/* ===== 金額分解（貪欲法） ===== */
function decompose(amount) {
  let rest = amount;
  const counts = {};
  for (const v of [1000,500,100,50,10,5,1]) {
    const n = Math.floor(rest / v);
    if (n > 0) { counts[v] = n; rest -= v * n; }
  }
  return counts;
}
function coinsHTML(counts) {
  if (Object.keys(counts).length === 0) return '<span class="empty-wallet">（からっぽ）</span>';
  let html = '';
  for (const d of DENOMS) {
    const n = counts[d.val] || 0;
    for (let i = 0; i < n; i++) {
      if (d.type === 'note') html += `<span>${noteSVG(NOTE_W_MINI, NOTE_H_MINI, d.val)}</span>`;
      else html += `<span>${coinSVG(d.val, COIN_MINI)}</span>`;
    }
  }
  return html;
}

/* ===== 乱数ヘルパー ===== */
function randInRangeStep(lo, hi, step) {
  step = Math.max(1, step);
  let loS = Math.ceil(lo / step), hiS = Math.floor(hi / step);
  if (hiS < loS) hiS = loS;
  const range = hiS - loS + 1;
  return (loS + Math.floor(Math.random() * range)) * step;
}
function pickEmoji() {
  return PRODUCTS[Math.floor(Math.random() * PRODUCTS.length)][0];
}
function shuffle2(a, b) {
  return Math.random() < 0.5 ? [a, b] : [b, a];
}

/* ===== もんだい生成：判断モード（商品1つ＋さいふ1つ） ===== */
function generateJudgeRound() {
  const P = randInRangeStep(minAmount, maxAmount, kizami);
  const buyableThisRound = Math.random() < 0.5;

  let W;
  if (buyableThisRound) {
    const margin = randInRangeStep(marginMin, marginMax, kizami);
    W = P + margin;
  } else {
    const downHi = Math.min(marginMax, P);
    const downLo = Math.min(marginMin, downHi);
    const margin = randInRangeStep(downLo, downHi, kizami);
    W = P - margin;
    if (W < 0) W = 0;
    if (W >= P) W = Math.max(0, P - kizami);
  }

  currentRound = {
    product: { emoji: pickEmoji(), price: P },
    wallet: { total: W },
    ok: W >= P
  };
}
function renderJudgeRound() {
  document.getElementById('prompt-text').textContent = 'これ、かえる？ かえない？';
  document.getElementById('c-product-emoji').textContent = currentRound.product.emoji;
  document.getElementById('c-product-price').textContent = currentRound.product.price + '円';

  document.getElementById('c-wallet-coins').innerHTML = coinsHTML(decompose(currentRound.wallet.total));
  const totalEl = document.getElementById('c-wallet-total');
  totalEl.textContent = currentRound.wallet.total + '円';
  totalEl.classList.toggle('hide', !showTotal);

  document.getElementById('btn-kaeru').classList.remove('disabled', 'correct-flash', 'wrong-flash');
  document.getElementById('btn-kaenai').classList.remove('disabled', 'correct-flash', 'wrong-flash');
}
function onJudge(answerIsKaeru) {
  if (busy) return;
  busy = true;
  const btnKaeru = document.getElementById('btn-kaeru');
  const btnKaenai = document.getElementById('btn-kaenai');
  btnKaeru.classList.add('disabled');
  btnKaenai.classList.add('disabled');

  const correct = answerIsKaeru === currentRound.ok;
  const tappedBtn = answerIsKaeru ? btnKaeru : btnKaenai;
  const trueBtn = currentRound.ok ? btnKaeru : btnKaenai;

  if (correct) {
    tappedBtn.classList.add('correct-flash');
    playCharin();
    showToast('せいかい！', 1200);
    advanceAfterAnswer(true, 1100);
  } else {
    tappedBtn.classList.add('wrong-flash');
    trueBtn.classList.add('correct-flash');
    playBuzz();
    showToast(currentRound.ok ? 'おしい！ かえるよ' : 'おしい！ かえないよ', 1600);
    advanceAfterAnswer(false, 1700);
  }
}

/* ===== もんだい生成：くらべるモード（さいふを選ぶ） ===== */
function generateWalletRound() {
  const P = randInRangeStep(minAmount, maxAmount, kizami);
  const noneBuyable = Math.random() < 0.5; // どちらも買えないパターンを半分の確率で

  const downHi = Math.min(marginMax, P);
  const downLo = Math.min(marginMin, downHi);
  function makeNotBuyableTotal() {
    const marginDown = randInRangeStep(downLo, downHi, kizami);
    let t = P - marginDown;
    if (t < 0) t = 0;
    if (t >= P) t = Math.max(0, P - kizami);
    return t;
  }

  let options;
  if (noneBuyable) {
    // 片方だけ違う金額にして、どちらも買えないようにする
    let t1 = makeNotBuyableTotal();
    let t2 = makeNotBuyableTotal();
    let guard = 0;
    while (t2 === t1 && guard++ < 10) t2 = makeNotBuyableTotal();
    options = shuffle2({ total: t1, ok: false }, { total: t2, ok: false });
  } else {
    const marginUp = randInRangeStep(marginMin, marginMax, kizami);
    const buyableTotal = P + marginUp;
    const notBuyableTotal = makeNotBuyableTotal();
    options = shuffle2({ total: buyableTotal, ok: true }, { total: notBuyableTotal, ok: false });
  }

  currentRound = {
    product: { emoji: pickEmoji(), price: P },
    options,
    anyBuyable: !noneBuyable
  };
}

/* ===== もんだい生成：くらべるモード（商品を選ぶ） ===== */
function generateProductRound() {
  const W = randInRangeStep(minAmount, maxAmount, kizami);
  const noneBuyable = Math.random() < 0.5;

  function makeNotBuyablePrice() {
    const marginUp = randInRangeStep(marginMin, marginMax, kizami);
    return W + marginUp;
  }

  const e1 = pickEmoji();
  let e2 = pickEmoji();
  let guard = 0;
  while (e2 === e1 && guard++ < 20) e2 = pickEmoji();

  let options;
  if (noneBuyable) {
    let p1 = makeNotBuyablePrice();
    let p2 = makeNotBuyablePrice();
    let g2 = 0;
    while (p2 === p1 && g2++ < 10) p2 = makeNotBuyablePrice();
    options = shuffle2({ emoji: e1, price: p1, ok: false }, { emoji: e2, price: p2, ok: false });
  } else {
    const downHiRaw = Math.min(marginMax, W - kizami);
    const downHi = Math.max(downHiRaw, 0);
    const downLo = Math.min(marginMin, downHi);
    let marginDown = downHi > 0 ? randInRangeStep(downLo, downHi, kizami) : kizami;
    let buyablePrice = W - marginDown;
    if (buyablePrice < kizami) buyablePrice = kizami;
    if (buyablePrice >= W) buyablePrice = Math.max(kizami, W - kizami);
    const notBuyablePrice = makeNotBuyablePrice();
    options = shuffle2({ emoji: e1, price: buyablePrice, ok: true }, { emoji: e2, price: notBuyablePrice, ok: false });
  }

  currentRound = {
    wallet: { total: W },
    options,
    anyBuyable: !noneBuyable
  };
}

function getActiveCompareRow() {
  return currentCompareMode === 'wallet'
    ? document.getElementById('m1-wallets-row')
    : document.getElementById('m2-products-row');
}
function disableAllCompareControls() {
  const row = getActiveCompareRow();
  [...row.children].forEach(b => b.classList.add('disabled'));
  document.getElementById('btn-compare-cant').classList.add('disabled');
}

function renderCompareRound() {
  document.getElementById('mode1-area').classList.toggle('active', currentCompareMode === 'wallet');
  document.getElementById('mode2-area').classList.toggle('active', currentCompareMode === 'product');

  const cantBtn = document.getElementById('btn-compare-cant');
  cantBtn.classList.remove('disabled', 'correct-flash', 'wrong-flash');

  if (currentCompareMode === 'wallet') {
    document.getElementById('prompt-text').textContent = 'かえる さいふは どっち？';
    document.getElementById('m1-product-emoji').textContent = currentRound.product.emoji;
    document.getElementById('m1-product-price').textContent = currentRound.product.price + '円';

    const row = document.getElementById('m1-wallets-row');
    row.innerHTML = '';
    currentRound.options.forEach(opt => {
      const box = document.createElement('div');
      box.className = 'wallet-option';
      box.innerHTML = `
        <div class="wallet-coins">${coinsHTML(decompose(opt.total))}</div>
        <div class="wallet-total${showTotal ? '' : ' hide'}">${opt.total}円</div>`;
      box.addEventListener('pointerdown', e => { e.preventDefault(); onCompareSelect(opt, box); });
      row.appendChild(box);
    });
  } else {
    document.getElementById('prompt-text').textContent = 'かえる しょうひんは どっち？';
    const wbox = document.getElementById('m2-wallet');
    wbox.innerHTML = `
      <div class="wallet-coins">${coinsHTML(decompose(currentRound.wallet.total))}</div>
      <div class="wallet-total${showTotal ? '' : ' hide'}">${currentRound.wallet.total}円</div>`;

    const row = document.getElementById('m2-products-row');
    row.innerHTML = '';
    currentRound.options.forEach(opt => {
      const box = document.createElement('div');
      box.className = 'product-option';
      box.innerHTML = `
        <div class="po-emoji">${opt.emoji}</div>
        <div class="po-price">${opt.price}円</div>`;
      box.addEventListener('pointerdown', e => { e.preventDefault(); onCompareSelect(opt, box); });
      row.appendChild(box);
    });
  }
}
function onCompareSelect(opt, box) {
  if (busy) return;
  busy = true;
  const row = getActiveCompareRow();
  const cantBtn = document.getElementById('btn-compare-cant');
  disableAllCompareControls();

  const correct = currentRound.anyBuyable && opt.ok;
  if (correct) {
    box.classList.add('correct-flash');
    playCharin();
    showToast('せいかい！かえるね', 1200);
    advanceAfterAnswer(true, 1100);
  } else {
    box.classList.add('wrong-flash');
    if (currentRound.anyBuyable) {
      const correctIdx = currentRound.options.indexOf(opt) === 0 ? 1 : 0;
      row.children[correctIdx].classList.add('correct-flash');
      showToast('おしい！こっちが かえるよ', 1600);
    } else {
      cantBtn.classList.add('correct-flash');
      showToast('おしい！ どちらも かえないよ', 1600);
    }
    playBuzz();
    advanceAfterAnswer(false, 1700);
  }
}
function onCompareCant() {
  if (busy) return;
  busy = true;
  const row = getActiveCompareRow();
  const cantBtn = document.getElementById('btn-compare-cant');
  disableAllCompareControls();

  const correct = !currentRound.anyBuyable;
  if (correct) {
    cantBtn.classList.add('correct-flash');
    playCharin();
    showToast('せいかい！', 1200);
    advanceAfterAnswer(true, 1100);
  } else {
    cantBtn.classList.add('wrong-flash');
    const correctIdx = currentRound.options.findIndex(o => o.ok);
    row.children[correctIdx].classList.add('correct-flash');
    playBuzz();
    showToast('おしい！ かえる ほうが あったよ', 1600);
    advanceAfterAnswer(false, 1700);
  }
}

/* ===== クイズ進行（共通） ===== */
function updateProgress() {
  document.getElementById('progress-text').textContent = currentQuestionNum + '/' + totalQuestions;
}
function showRound() {
  updateProgress();
  document.getElementById('judge-area').classList.toggle('active', gameType === 'judge');
  document.getElementById('compare-area').classList.toggle('active', gameType === 'compare');

  if (gameType === 'judge') {
    generateJudgeRound();
    renderJudgeRound();
  } else {
    currentCompareMode = compareSubMode === 'random' ? (Math.random() < 0.5 ? 'wallet' : 'product') : compareSubMode;
    if (currentCompareMode === 'wallet') generateWalletRound(); else generateProductRound();
    renderCompareRound();
  }
}
function advanceAfterAnswer(correct, delay) {
  if (correct) correctCount++;
  currentQuestionNum++;
  setTimeout(() => {
    busy = false;
    if (currentQuestionNum > totalQuestions) {
      showResults();
    } else {
      showRound();
    }
  }, delay);
}
function initQuiz() {
  currentQuestionNum = 1;
  correctCount = 0;
  busy = false;
  document.getElementById('toast').classList.remove('show');
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('main-screen').classList.add('active');
  document.getElementById('gear-btn').style.display = 'block';
  showRound();
}
function showResults() {
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('gear-btn').style.display = 'none';
  const ratio = totalQuestions > 0 ? correctCount / totalQuestions : 0;
  let msg, emoji;
  if (ratio >= 1)        { msg = 'パーフェクト！'; emoji = '🏆'; }
  else if (ratio >= 0.9) { msg = 'パーフェクトに ちかいね！すごい！'; emoji = '🎉'; }
  else if (ratio >= 0.7) { msg = 'よくできました！'; emoji = '🎉'; }
  else if (ratio >= 0.4) { msg = 'がんばったね！'; emoji = '😊'; }
  else                   { msg = 'れんしゅう できたね！'; emoji = '🙂'; }
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = totalQuestions + '問中 ' + correctCount + '問 せいかい！';
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('result-screen').classList.add('active');
}

/* ===== トースト ===== */
function showToast(msg, dur) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => { el.classList.remove('show'); }, dur);
}

/* ===== 音 ===== */
const AudioCtxCls = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getACtx() {
  if (!audioCtx) audioCtx = new AudioCtxCls();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playCharin() {
  const ctx = getACtx(), t = ctx.currentTime;
  [[1200,t,0.15],[1500,t+0.1,0.15],[1800,t+0.2,0.15]].forEach(([freq,start,dur]) => {
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,start); g.gain.linearRampToValueAtTime(0.25,start+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,start+dur);
    o.connect(g); g.connect(ctx.destination); o.start(start); o.stop(start+dur+0.02);
  });
}
function playBuzz() {
  const ctx = getACtx(), t = ctx.currentTime;
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(220, t);
  o.frequency.exponentialRampToValueAtTime(110, t + 0.3);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.16, t + 0.03);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  o.connect(g); g.connect(ctx.destination);
  o.start(t); o.stop(t + 0.4);
}

/* ===== 設定 ===== */
function openSettings() {
  buildSettingsUI();
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('result-screen').classList.remove('active');
  document.getElementById('settings-screen').classList.add('active');
}
function closeSettings() {
  document.getElementById('settings-screen').classList.remove('active');
  initQuiz();
}
function buildSettingsUI() {
  document.querySelectorAll('#gametype-seg .seg-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.gametype === gameType);
  });
  document.getElementById('compare-sub-wrap').style.display = gameType === 'compare' ? 'block' : 'none';
  document.querySelectorAll('#compare-sub-seg .seg-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === compareSubMode);
  });

  document.getElementById('s-qcount').textContent = totalQuestions;

  document.getElementById('toggle-show-total').checked = showTotal;
  document.getElementById('s-min-amount').textContent = minAmount;
  document.getElementById('s-max-amount').textContent = maxAmount;
  document.getElementById('s-margin-min').textContent = marginMin;
  document.getElementById('s-margin-max').textContent = marginMax;

  const kg = document.getElementById('kizami-group');
  kg.innerHTML = '';
  for (const k of KIZAMI_OPTIONS) {
    const btn = document.createElement('button');
    btn.className = 'kizami-btn' + (k === kizami ? ' active' : '');
    btn.textContent = k + '円'; btn.dataset.kizami = k;
    kg.appendChild(btn);
  }
}
function changeQCount(delta) {
  totalQuestions = Math.max(5, totalQuestions + delta * 5);
  document.getElementById('s-qcount').textContent = totalQuestions;
}
function changeMinAmount(delta) {
  minAmount = Math.max(kizami, minAmount + delta * kizami);
  if (minAmount > maxAmount) maxAmount = minAmount;
  document.getElementById('s-min-amount').textContent = minAmount;
  document.getElementById('s-max-amount').textContent = maxAmount;
}
function changeMaxAmount(delta) {
  maxAmount = Math.max(minAmount, maxAmount + delta * kizami);
  document.getElementById('s-max-amount').textContent = maxAmount;
}
function changeMarginMin(delta) {
  marginMin = Math.max(kizami, marginMin + delta * kizami);
  if (marginMin > marginMax) marginMax = marginMin;
  document.getElementById('s-margin-min').textContent = marginMin;
  document.getElementById('s-margin-max').textContent = marginMax;
}
function changeMarginMax(delta) {
  marginMax = Math.max(marginMin, marginMax + delta * kizami);
  document.getElementById('s-margin-max').textContent = marginMax;
}

/* ===== イベント ===== */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btn-kaeru').addEventListener('pointerdown', e => { e.preventDefault(); onJudge(true); });
  document.getElementById('btn-kaenai').addEventListener('pointerdown', e => { e.preventDefault(); onJudge(false); });

  document.getElementById('btn-compare-cant').addEventListener('pointerdown', e => { e.preventDefault(); onCompareCant(); });
  document.getElementById('gear-btn').addEventListener('click', openSettings);
  document.getElementById('s-back-btn').addEventListener('click', closeSettings);
  document.getElementById('result-restart-btn').addEventListener('click', initQuiz);

  document.getElementById('gametype-seg').addEventListener('click', e => {
    const btn = e.target.closest('.seg-btn');
    if (!btn) return;
    gameType = btn.dataset.gametype;
    document.querySelectorAll('#gametype-seg .seg-btn').forEach(b => b.classList.toggle('active', b === btn));
    document.getElementById('compare-sub-wrap').style.display = gameType === 'compare' ? 'block' : 'none';
  });
  document.getElementById('compare-sub-seg').addEventListener('click', e => {
    const btn = e.target.closest('.seg-btn');
    if (!btn) return;
    compareSubMode = btn.dataset.mode;
    document.querySelectorAll('#compare-sub-seg .seg-btn').forEach(b => b.classList.toggle('active', b === btn));
  });

  document.getElementById('s-qcount-minus').addEventListener('click', () => changeQCount(-1));
  document.getElementById('s-qcount-plus').addEventListener('click',  () => changeQCount(+1));

  document.getElementById('toggle-show-total').addEventListener('change', e => {
    showTotal = e.target.checked;
  });

  document.getElementById('s-min-minus').addEventListener('click', () => changeMinAmount(-1));
  document.getElementById('s-min-plus').addEventListener('click',  () => changeMinAmount(+1));
  document.getElementById('s-max-minus').addEventListener('click', () => changeMaxAmount(-1));
  document.getElementById('s-max-plus').addEventListener('click',  () => changeMaxAmount(+1));

  document.getElementById('s-mgmin-minus').addEventListener('click', () => changeMarginMin(-1));
  document.getElementById('s-mgmin-plus').addEventListener('click',  () => changeMarginMin(+1));
  document.getElementById('s-mgmax-minus').addEventListener('click', () => changeMarginMax(-1));
  document.getElementById('s-mgmax-plus').addEventListener('click',  () => changeMarginMax(+1));

  document.getElementById('kizami-group').addEventListener('click', e => {
    const btn = e.target.closest('[data-kizami]');
    if (!btn) return;
    kizami = Number(btn.dataset.kizami);
    document.querySelectorAll('.kizami-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    minAmount = Math.max(kizami, Math.round(minAmount / kizami) * kizami);
    maxAmount = Math.max(minAmount, Math.round(maxAmount / kizami) * kizami);
    marginMin = Math.max(kizami, Math.round(marginMin / kizami) * kizami);
    marginMax = Math.max(marginMin, Math.round(marginMax / kizami) * kizami);
    document.getElementById('s-min-amount').textContent = minAmount;
    document.getElementById('s-max-amount').textContent = maxAmount;
    document.getElementById('s-margin-min').textContent = marginMin;
    document.getElementById('s-margin-max').textContent = marginMax;
  });

  setTimeout(() => { openSettings(); }, 50);
});
</script>
